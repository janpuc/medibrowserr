apiVersion: apps/v1
kind: Deployment
metadata:
  name: medibrowserr
  labels:
    app.kubernetes.io/name: medibrowserr
spec:
  # SQLite on a RWO volume + in-process scheduler → exactly one replica.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: medibrowserr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: medibrowserr
    spec:
      securityContext:
        fsGroup: 1001
      containers:
        - name: medibrowserr
          image: ghcr.io/janpuc/medibrowserr:latest
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: TZ
              value: Europe/Warsaw
          # Optional: seed credentials from a Secret instead of the UI.
          # envFrom:
          #   - secretRef:
          #       name: medibrowserr-secrets
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 192Mi
            limits:
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1001
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: medibrowserr-data
