# Optional: seed credentials as env vars instead of typing them in the UI.
# Create with real values (never commit them):
#   kubectl create secret generic medibrowserr-secrets \
#     --from-literal=MEDICOVER_USER=... \
#     --from-literal=MEDICOVER_PASS=... \
#     --from-literal=PUSHOVER_TOKEN=... \
#     --from-literal=PUSHOVER_USER=...
apiVersion: v1
kind: Secret
metadata:
  name: medibrowserr-secrets
type: Opaque
stringData:
  MEDICOVER_USER: "your-card-number"
  MEDICOVER_PASS: "your-password"
  PUSHOVER_TOKEN: "your-pushover-app-token"
  PUSHOVER_USER: "your-pushover-user-key"
